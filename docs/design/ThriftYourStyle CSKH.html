  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;

    // events at the element — warn only; real JS errors carry message/error.

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker

    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.

      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.

        (e.origin === 'null' &&

            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );

    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.

            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);

        resourceBlobs[blobUrls[uuid]] = blob;
      }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"display:flex;align-items:center;justify-content:space-between;gap:8px;\"><span style=\"font-size:11.5px;color:#5A6743;font-family:ui-monospace,monospace;\">{{ r.src }}<\u002Fspan><span style=\"font-size:11px;color:#B0A99B;\">điểm {{ r.score }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:#57534A;line-height:1.5;margin-top:3px;\">{{ r.text }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- suggested draft (focus) -->\n            <div style=\"background:#FFFFFF;border:1.5px solid #6B7A4F;border-radius:13px;padding:18px 20px;box-shadow:0 4px 16px rgba(107,122,79,.10);\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;\">\n                <div style=\"font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:#5A6743;font-weight:600;\">Nháp phản hồi gợi ý<\u002Fdiv>\n                <span style=\"font-size:11.5px;color:#8E887B;\">AI soạn từ RAG context · sửa trước khi gửi<\u002Fspan>\n              <\u002Fdiv>\n              <textarea style=\"width:100%;min-height:118px;resize:vertical;border:1px solid #E7E2D8;border-radius:10px;padding:13px 15px;font-family:inherit;font-size:14.5px;line-height:1.6;color:#211F1B;background:#FDFCFA;outline:none;\">{{ esc.draft }}<\u002Ftextarea>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap;\">\n                <button style=\"border:none;cursor:pointer;background:#6B7A4F;color:#fff;font-family:inherit;font-size:14px;font-weight:600;padding:11px 22px;border-radius:9px;\">Nhận ca &amp; gửi<\u002Fbutton>\n                <button style=\"cursor:pointer;background:#FFFFFF;border:1px solid #E7E2D8;color:#332F29;font-family:inherit;font-size:14px;font-weight:500;padding:11px 20px;border-radius:9px;\">Nhận ca, chat trực tiếp<\u002Fbutton>\n                <button style=\"cursor:pointer;background:transparent;border:1px solid #E7E2D8;color:#8E887B;font-family:inherit;font-size:14px;padding:11px 18px;border-radius:9px;\">Xem toàn bộ transcript ↗<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MODULE: Approval -->\n      <sc-if value=\"{{ modApproval }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1;overflow-y:auto;background:#FDFCFA;\">\n        <div class=\"pagepad\" style=\"max-width:760px;margin:0 auto;padding:28px 32px 48px;\">\n          <div style=\"font-family:'Instrument Serif',serif;font-size:27px;\">Duyệt nháp phản hồi<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#8E887B;margin-top:5px;max-width:560px;line-height:1.55;\">Các ca AI tự tin &amp; có căn cứ, nhưng thuộc nhóm nhạy cảm nên gate auto-reply đang <strong style=\"color:#B98534;\">TẮT<\u002Fstrong> — cần nhân viên duyệt trước khi gửi cho khách.<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:22px;\">\n            <sc-for list=\"{{ approvals }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"background:#FFFFFF;border:1px solid #E7E2D8;border-radius:13px;padding:18px 20px;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n                  <div style=\"display:flex;align-items:center;gap:10px;\">\n                    <span style=\"font-size:14.5px;font-weight:600;\">{{ a.name }}<\u002Fspan>\n                    <span style=\"font-size:11.5px;color:#B98534;background:#F7EFDD;border-radius:6px;padding:3px 9px;\">{{ a.catLabel }} · nhạy cảm<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"font-size:12px;color:#8E887B;\">confidence {{ a.confPct }} · {{ a.time }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:13.5px;color:#8E887B;margin-top:12px;background:#F9F8F4;border-radius:8px;padding:9px 13px;\">Khách hỏi: “{{ a.question }}”<\u002Fdiv>\n                <div style=\"font-size:14.5px;line-height:1.6;color:#211F1B;margin-top:12px;padding:2px 2px;\">{{ a.draft }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px;\">\n                  <span style=\"font-size:11.5px;color:#B0A99B;\">Căn cứ<\u002Fspan>\n                  <sc-for list=\"{{ a.sources }}\" as=\"s\" hint-placeholder-count=\"1\"><span style=\"font-size:11.5px;color:#5A6743;background:#EEF0E6;border:1px solid #DDE1D0;border-radius:6px;padding:2px 8px;font-family:ui-monospace,monospace;\">{{ s }}<\u002Fspan><\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:9px;margin-top:15px;border-top:1px solid #F0EDE6;padding-top:14px;flex-wrap:wrap;\">\n                  <button style=\"border:none;cursor:pointer;background:#6B7A4F;color:#fff;font-family:inherit;font-size:13.5px;font-weight:600;padding:9px 18px;border-radius:8px;\">Duyệt &amp; gửi<\u002Fbutton>\n                  <button style=\"cursor:pointer;background:#FFFFFF;border:1px solid #E7E2D8;color:#332F29;font-family:inherit;font-size:13.5px;font-weight:500;padding:9px 16px;border-radius:8px;\">Sửa &amp; gửi<\u002Fbutton>\n                  <button style=\"cursor:pointer;background:transparent;border:1px solid #E7E2D8;color:#8E887B;font-family:inherit;font-size:13.5px;padding:9px 16px;border-radius:8px;\">Chuyển xử lý tay<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MODULE: RAG -->\n      <sc-if value=\"{{ modRag }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1;overflow-y:auto;background:#FDFCFA;\">\n        <div class=\"pagepad\" style=\"max-width:860px;margin:0 auto;padding:28px 32px 48px;\">\n          <div style=\"font-family:'Instrument Serif',serif;font-size:27px;\">Quản lý tri thức (RAG)<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#8E887B;margin-top:5px;\">Tài liệu được chunk → embedding → lưu Qdrant, làm căn cứ cho phản hồi tự động.<\u002Fdiv>\n\n          <div style=\"margin-top:22px;border:1.5px dashed #D6D0C2;border-radius:14px;background:repeating-linear-gradient(135deg,#FFFFFF,#FFFFFF 11px,#F7F5EF 11px,#F7F5EF 22px);padding:34px;text-align:center;\">\n            <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:#8E887B;\">Kéo thả tài liệu vào đây<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#B0A99B;margin-top:6px;\">Hỗ trợ PDF · DOCX · TXT · MD<\u002Fdiv>\n            <button style=\"margin-top:15px;border:none;cursor:pointer;background:#211F1B;color:#F7F5F0;font-family:inherit;font-size:13.5px;font-weight:600;padding:10px 20px;border-radius:9px;\">Chọn tệp tải lên<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:28px;margin-bottom:10px;\">\n            <div style=\"font-size:14px;font-weight:600;\">Tài liệu ({{ ragCount }})<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#8E887B;\">{{ ragIndexed }} đã index · {{ ragPending }} chờ index<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"scroll-x\" style=\"background:#FFFFFF;border:1px solid #E7E2D8;border-radius:13px;overflow:hidden;\">\n            <div class=\"grid-row\" style=\"display:grid;grid-template-columns:1fr 90px 130px 90px 150px;gap:12px;padding:12px 18px;border-bottom:1px solid #F0EDE6;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:#B0A99B;\">\n              <span>Tài liệu<\u002Fspan><span>Định dạng<\u002Fspan><span>Trạng thái<\u002Fspan><span>Chunks<\u002Fspan><span style=\"text-align:right;\">Thao tác<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ ragDocs }}\" as=\"d\" hint-placeholder-count=\"6\">\n              <div class=\"grid-row\" style=\"display:grid;grid-template-columns:1fr 90px 130px 90px 150px;gap:12px;padding:14px 18px;border-bottom:1px solid #F6F4EE;align-items:center;\">\n                <div style=\"display:flex;flex-direction:column;gap:2px;\"><span style=\"font-size:14px;font-weight:500;\">{{ d.title }}<\u002Fspan><span style=\"font-size:11.5px;color:#B0A99B;font-family:ui-monospace,monospace;\">{{ d.file }}<\u002Fspan><\u002Fdiv>\n                <span style=\"font-size:12px;color:#8E887B;font-family:ui-monospace,monospace;\">{{ d.type }}<\u002Fspan>\n                <div>\n                  <sc-if value=\"{{ d.indexed }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11.5px;color:#5B7A5B;background:#E8EFE6;border-radius:6px;padding:3px 9px;display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#5B7A5B;\"><\u002Fspan>Đã index<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ d.pending }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11.5px;color:#B98534;background:#F7EFDD;border-radius:6px;padding:3px 9px;display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#B98534;\"><\u002Fspan>Chờ index<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <span style=\"font-size:13px;color:#57534A;\">{{ d.chunks }}<\u002Fspan>\n                <div style=\"display:flex;gap:8px;justify-content:flex-end;\">\n                  <button style=\"cursor:pointer;background:transparent;border:1px solid #E7E2D8;color:#57534A;font-family:inherit;font-size:12px;padding:5px 10px;border-radius:7px;\">Re-index<\u002Fbutton>\n                  <button style=\"cursor:pointer;background:transparent;border:1px solid #E7E2D8;color:#B25B3C;font-family:inherit;font-size:12px;padding:5px 10px;border-radius:7px;\">Xóa<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MODULE: Gate -->\n      <sc-if value=\"{{ modGate }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1;overflow-y:auto;background:#FDFCFA;\">\n        <div class=\"pagepad\" style=\"max-width:760px;margin:0 auto;padding:28px 32px 48px;\">\n          <div style=\"font-family:'Instrument Serif',serif;font-size:27px;\">Cấu hình Gate<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#8E887B;margin-top:5px;max-width:600px;line-height:1.55;\">Gate chỉ điều chỉnh <strong>mức độ tự động<\u002Fstrong> cho ca AI tự tin. Ca có cờ bất định luôn được chuyển nhân viên — an toàn không bị gate ghi đè.<\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:24px;\">\n            <div style=\"background:#FFFFFF;border:1px solid #E7E2D8;border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n              <div><div style=\"font-size:14.5px;font-weight:600;\">Auto-reply (toàn hệ thống)<\u002Fdiv><div style=\"font-size:12.5px;color:#8E887B;margin-top:2px;\">Gửi thẳng phản hồi AI cho ca tự tin, không cờ bất định.<\u002Fdiv><\u002Fdiv>\n              <sc-if value=\"{{ gAutoReply }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ toggleAutoReply }}\" style=\"cursor:pointer;border:none;width:48px;height:27px;border-radius:14px;background:#6B7A4F;position:relative;flex:0 0 48px;\"><span style=\"position:absolute;top:3px;left:24px;width:21px;height:21px;border-radius:50%;background:#fff;\"><\u002Fspan><\u002Fbutton><\u002Fsc-if>\n              <sc-if value=\"{{ gAutoReplyOff }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ toggleAutoReply }}\" style=\"cursor:pointer;border:none;width:48px;height:27px;border-radius:14px;background:#DAD5C8;position:relative;flex:0 0 48px;\"><span style=\"position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;\"><\u002Fspan><\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E7E2D8;border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n              <div><div style=\"font-size:14.5px;font-weight:600;\">Auto-resolve<\u002Fdiv><div style=\"font-size:12.5px;color:#8E887B;margin-top:2px;\">Tự đóng hội thoại khi khách im lặng quá ngưỡng.<\u002Fdiv><\u002Fdiv>\n              <sc-if value=\"{{ gAutoResolve }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ toggleAutoResolve }}\" style=\"cursor:pointer;border:none;width:48px;height:27px;border-radius:14px;background:#6B7A4F;position:relative;flex:0 0 48px;\"><span style=\"position:absolute;top:3px;left:24px;width:21px;height:21px;border-radius:50%;background:#fff;\"><\u002Fspan><\u002Fbutton><\u002Fsc-if>\n              <sc-if value=\"{{ gAutoResolveOff }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ toggleAutoResolve }}\" style=\"cursor:pointer;border:none;width:48px;height:27px;border-radius:14px;background:#DAD5C8;position:relative;flex:0 0 48px;\"><span style=\"position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;\"><\u002Fspan><\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"font-size:14px;font-weight:600;margin-top:28px;margin-bottom:10px;\">Auto-reply theo intent / category<\u002Fdiv>\n          <div style=\"background:#FFFFFF;border:1px solid #E7E2D8;border-radius:13px;overflow:hidden;\">\n            <sc-for list=\"{{ gateCats }}\" as=\"g\" hint-placeholder-count=\"10\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;border-bottom:1px solid #F6F4EE;\">\n                <div style=\"display:flex;align-items:center;gap:10px;\">\n                  <span style=\ =\"font-size:14px;font-weight:600;color:#6B7A4F;font-family:ui-monospace,monospace;\">0.70<\u002Fspan><\u002Fdiv>\n            <div style=\"height:6px;background:#EFEBE2;border-radius:4px;margin-top:14px;position:relative;\"><div style=\"position:absolute;left:0;top:0;height:6px;width:70%;background:#6B7A4F;border-radius:4px;\"><\u002Fdiv><div style=\"position:absolute;left:70%;top:-4px;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #6B7A4F;transform:translateX(-50%);\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:12px;color:#8E887B;margin-top:9px;\">Dưới ngưỡng → Decision Engine đặt action = human_handoff.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    app: 'customer',\n    cust: 'ai',\n    module: 'conversations',\n    convFilter: 'all',\n    convId: 4,\n    escId: 1,\n    isMobile: false,\n    drawerOpen: false,\n    mDetailConv: false,\n    mDetailEsc: false,\n    gate: {\n      autoReply: true,\n      autoResolve: false,\n      cats: {\n        product_price: true, product_information: true, size_consulting: true,\n        shipping: true, order_status: true, promotion: true,\n        refund: false, exchange: false, complaint: false, other: false\n      }\n    }\n  };\n\n  componentDidMount() {\n    this._onResize = () => {\n      const m = window.innerWidth <= 820;\n      if (m !== this.state.isMobile) this.setState({ isMobile: m });\n    };\n    window.addEventListener('resize', this._onResize);\n    this._onResize();\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n\n  toggleAutoReply = () => this.setState(s => ({ gate: { ...s.gate, autoReply: !s.gate.autoReply } }));\n  toggleAutoResolve = () => this.setState(s => ({ gate: { ...s.gate, autoResolve: !s.
