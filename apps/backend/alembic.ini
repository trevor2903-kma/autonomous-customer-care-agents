# Alembic config. DB URL/SSL are configured dynamically in alembic/env.py
# (reads app.core.config from the repo-root .env). ASCII-only: Alembic reads this
# file with the system locale codec (cp1252 on Windows), so no diacritics here.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally NOT set here; env.py uses settings.database_url
# (postgresql+asyncpg, SSL via connect_args).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
